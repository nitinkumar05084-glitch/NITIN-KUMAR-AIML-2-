<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    text-align:center;
    padding:20px;
}

.cart-box{
    position:fixed;
    top:15px;
    right:20px;
    background:white;
    padding:10px 15px;
    border-radius:5px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin:30px;
}

.product{
    width:250px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
    padding-bottom:15px;
}

.product img{
    width:100%;
    height:200px;
}

.product h3{
    margin:10px 0;
}

.price{
    color:green;
    font-size:20px;
    margin-bottom:10px;
}

.add-btn{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    border-radius:5px;
}

.add-btn:hover{
    background:#0056b3;
}

.cart{
    width:80%;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.cart h2{
    margin-bottom:15px;
}

.cart ul{
    list-style:none;
}

.cart li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.remove-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    cursor:pointer;
    border-radius:5px;
}

.remove-btn:hover{
    background:darkred;
}
</style>
</head>

<body>

<header>
    <h1>My Shopping Store</h1>
</header>

<div class="cart-box">
    Cart Items: <span id="cartCount">0</span>
</div>

<div class="container">

    <div class="product">
        <img src="sports shoe.jpeg" alt="Shoes">
        <h3>Sports Shoes</h3>
        <p class="price">₹1999</p>
        <button class="add-btn" onclick="addToCart('Sports Shoes')">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="smart watch.jpeg" alt="Watch">
        <h3>Smart Watch</h3>
        <p class="price">₹2999</p>
        <button class="add-btn" onclick="addToCart('Smart Watch')">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="wireless headphone.jpeg" alt="Headphones">
        <h3>Headphones</h3>
        <p class="price">₹1499</p>
        <button class="add-btn" onclick="addToCart('Headphones')">
            Add to Cart
        </button>
    </div>

</div>

<div class="cart">
    <h2>Your Cart</h2>
    <ul id="cartList"></ul>
</div>

<script>
let cartCount = 0;

function addToCart(productName){

    cartCount++;
    document.getElementById("cartCount").innerText = cartCount;

    let li = document.createElement("li");

    li.innerHTML = `
        <span>${productName}</span>
        <button class="remove-btn" onclick="removeItem(this)">
            Remove
        </button>
    `;

    document.getElementById("cartList").appendChild(li);
}

function removeItem(button){

    button.parentElement.remove();

    cartCount--;
    document.getElementById("cartCount").innerText = cartCount;
}
</script>

</body>
</html>
